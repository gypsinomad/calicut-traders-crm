<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calicut Traders CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/trade/192/192">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.background = 'white';
        div.style.zIndex = '10000';
        div.style.padding = '20px';
        div.style.border = '2px solid red';
        div.innerText = 'Runtime Error: ' + msg + '\nFile: ' + url + '\nLine: ' + lineNo;
        document.body.appendChild(div);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.color = 'orange';
        div.style.position = 'fixed';
        div.style.top = '100px';
        div.style.left = '0';
        div.style.background = 'white';
        div.style.zIndex = '10000';
        div.style.padding = '20px';
        div.style.border = '2px solid orange';
        div.innerText = 'Unhandled Rejection: ' + event.reason;
        document.body.appendChild(div);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
