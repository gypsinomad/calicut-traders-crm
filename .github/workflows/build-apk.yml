name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'release' }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android123' }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android123' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup keystore
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/keystore.jks"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Decoding keystore from KEYSTORE_BASE64 secret..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          else
            echo "Generating new keystore with alias=$KEY_ALIAS..."
            keytool -genkeypair \
              -v \
              -keystore "$KEYSTORE_PATH" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=Calicut Traders, OU=Dev, O=CalicutTraders, L=Kozhikode, ST=Kerala, C=IN"
          fi

          echo "Verifying keystore:"
          keytool -list -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASSWORD" 2>&1 | grep -E 'Alias|Your keystore' | head -5

      - name: Configure build.gradle signing
        run: |
          GRADLE_FILE="$GITHUB_WORKSPACE/android/app/build.gradle"

          echo "=== ORIGINAL build.gradle ==="
          cat "$GRADLE_FILE"
          echo "=== END ==="

          # Use Python to inject signing config into build.gradle
          python3 - "$GRADLE_FILE" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" << 'PYEOF'
          import sys, re

          gradle_path = sys.argv[1]
          store_pass = sys.argv[2]
          key_alias = sys.argv[3]
          key_pass = sys.argv[4]

          with open(gradle_path) as f:
              content = f.read()

          signing_config_block = """
              signingConfigs {
                  release {
                      storeFile file('keystore.jks')
                      storePassword '%s'
                      keyAlias '%s'
                      keyPassword '%s'
                  }
              }
          """ % (store_pass, key_alias, key_pass)

          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config_block, 1)
              print('Inserted signingConfigs block')

          # Add signingConfig reference in buildTypes.release
          if 'signingConfig signingConfigs.release' not in content:
              content = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  content,
                  count=1,
                  flags=re.DOTALL
              )
              print('Added signingConfig to buildTypes.release')

          with open(gradle_path, 'w') as f:
              f.write(content)

          print('build.gradle patched. Alias:', key_alias)
          PYEOF

          echo "=== PATCHED build.gradle ==="
          cat "$GRADLE_FILE"
          echo "=== END ==="

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        run: find android -name '*.apk' 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calicut-traders-crm-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
