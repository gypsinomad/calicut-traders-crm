name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/keystore.jks"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from secret..."
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret found, generating new keystore..."
            ALIAS=${KEY_ALIAS:-release}
            STOREPASS=${STORE_PASSWORD:-android123}
            KEYPASS=${KEY_PASSWORD:-android123}
            keytool -genkeypair \
              -v \
              -keystore "$KEYSTORE_PATH" \
              -alias "$ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STOREPASS" \
              -keypass "$KEYPASS" \
              -dname "CN=Calicut Traders, OU=Dev, O=CalicutTraders, L=Kozhikode, ST=Kerala, C=IN"
            echo "Generated new keystore with alias: $ALIAS"
          fi

          echo "Verifying keystore..."
          keytool -list -keystore "$KEYSTORE_PATH" \
            -storepass "${STORE_PASSWORD:-android123}" \
            -alias "${KEY_ALIAS:-release}" 2>&1 | head -5 || true

          echo "Writing signing.properties..."
          cat > "$GITHUB_WORKSPACE/android/signing.properties" << EOF
          storeFile=keystore.jks
          storePassword=${STORE_PASSWORD:-android123}
          keyAlias=${KEY_ALIAS:-release}
          keyPassword=${KEY_PASSWORD:-android123}
          EOF
          echo "Signing setup complete"

      - name: Patch build.gradle for signing
        run: |
          GRADLE_FILE="$GITHUB_WORKSPACE/android/app/build.gradle"
          SIGNING_PROPS="$GITHUB_WORKSPACE/android/signing.properties"

          python3 - << 'PYEOF'
          import re

          gradle_path = '${{ github.workspace }}/android/app/build.gradle'
          props_path = '${{ github.workspace }}/android/signing.properties'

          with open(props_path) as f:
              props = {}
              for line in f:
                  line = line.strip()
                  if '=' in line:
                      k, v = line.split('=', 1)
                      props[k.strip()] = v.strip()

          store_file = props.get('storeFile', 'keystore.jks')
          store_password = props.get('storePassword', 'android123')
          key_alias = props.get('keyAlias', 'release')
          key_password = props.get('keyPassword', 'android123')

          signing_config = f"""
              signingConfigs {{
                  release {{
                      storeFile file('{store_file}')
                      storePassword '{store_password}'
                      keyAlias '{key_alias}'
                      keyPassword '{key_password}'
                  }}
              }}
          """

          with open(gradle_path) as f:
              content = f.read()

          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config, 1)

          content = re.sub(
              r'buildTypes\s*\{[^}]*release\s*\{',
              'buildTypes {\n        release {\n            signingConfig signingConfigs.release',
              content
          )

          with open(gradle_path, 'w') as f:
              f.write(content)

          print('build.gradle patched successfully')
          PYEOF

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calicut-traders-crm-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
