name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'release' }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android123' }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android123' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup keystore and signing
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/keystore.jks"
          echo "Using alias=$KEY_ALIAS storepass=${STORE_PASSWORD:0:3}***"
          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storetype JKS \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Calicut Traders,OU=Dev,O=CalicutTraders,L=Kozhikode,ST=Kerala,C=IN"
          echo "Keystore size: $(ls -la $KEYSTORE_PATH | awk '{print $5}') bytes"
          keytool -list -keystore "$KEYSTORE_PATH" -storepass "$STORE_PASSWORD" 2>&1 | head -6
          GRADLE_FILE="$GITHUB_WORKSPACE/android/app/build.gradle"
          python3 -c "
import sys, re
gradle_path = '$GITHUB_WORKSPACE/android/app/build.gradle'
keystore_path = '$GITHUB_WORKSPACE/android/app/keystore.jks'
store_pass = '$STORE_PASSWORD'
key_alias = '$KEY_ALIAS'
key_pass = '$KEY_PASSWORD'
with open(gradle_path) as f:
    content = f.read()
signing = \"\\n    signingConfigs {\\n        release {\\n            storeFile file('\" + keystore_path + \"')\\n            storePassword '\" + store_pass + \"'\\n            keyAlias '\" + key_alias + \"'\\n            keyPassword '\" + key_pass + \"'\\n        }\\n    }\\n\"
if 'signingConfigs' not in content:
    content = content.replace('android {', 'android {' + signing, 1)
if 'signingConfig signingConfigs.release' not in content:
    content = re.sub(r'(buildTypes[\\s\\S]*?release\\s*\\{)', r'\\1\\n            signingConfig signingConfigs.release', content, count=1)
with open(gradle_path, 'w') as f:
    f.write(content)
print('Patched OK alias=' + key_alias)
"

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        if: always()
        run: find android -name '*.apk' 2>/dev/null || echo 'No APK found'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calicut-traders-crm-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
