name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already present"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate signing keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
            echo "SIGNING_STORE_TYPE=pkcs12" >> $GITHUB_ENV
            echo "Using keystore from KEYSTORE_BASE64 secret"
          else
            keytool -genkeypair -v \
              -keystore android/app/release.keystore \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=Calicut Traders CRM, OU=Dev, O=CalicutTraders, L=Kozhikode, S=Kerala, C=IN"
            echo "SIGNING_STORE_TYPE=pkcs12" >> $GITHUB_ENV
            echo "Generated new PKCS12 keystore with alias: release"
          fi

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          KEYSTORE_PATH="$(pwd)/app/release.keystore"
          KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
          KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"
          [ -z "$KEY_ALIAS" ] && KEY_ALIAS="release"
          [ -z "$KEY_PASSWORD" ] && KEY_PASSWORD="android123"
          [ -z "$STORE_PASSWORD" ] && STORE_PASSWORD="android123"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calicut-traders-crm-release
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Calicut Traders CRM v${{ github.run_number }}"
          body: |
            ## Calicut Traders CRM Android Release
            Built from commit ${{ github.sha }}

            ### Download
            Download the APK from the assets below and install on your Android device.

            > Enable "Install from unknown sources" in Android settings if needed.
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
