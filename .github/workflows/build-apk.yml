name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_META_PAGE_ACCESS_TOKEN: ${{ secrets.VITE_META_PAGE_ACCESS_TOKEN }}
          VITE_META_PAGE_ID: ${{ secrets.VITE_META_PAGE_ID }}
          VITE_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.VITE_WHATSAPP_PHONE_NUMBER_ID }}
          VITE_WHATSAPP_ACCESS_TOKEN: ${{ secrets.VITE_WHATSAPP_ACCESS_TOKEN }}
          VITE_GITHUB_OWNER: ${{ github.repository_owner }}
          VITE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/keystore.jks
          echo "Keystore file size: $(wc -c < $GITHUB_WORKSPACE/keystore.jks) bytes"
          echo "Listing keystore:"
          keytool -list -keystore $GITHUB_WORKSPACE/keystore.jks -storepass "${{ secrets.STORE_PASSWORD }}" 2>&1 | head -15 || echo "WARN: keytool list failed"

      - name: Patch build.gradle with signing config
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/keystore.jks"
          python3 << PYEOF
          gradle_path = 'android/app/build.gradle'
          keystore_path = '$KEYSTORE_PATH'
          store_pw = '${{ secrets.STORE_PASSWORD }}'
          key_alias = '${{ secrets.KEY_ALIAS }}'
          key_pw = '${{ secrets.KEY_PASSWORD }}'

          with open(gradle_path, 'r') as f:
              content = f.read()

          signing_block = '''
              signingConfigs {
                  release {
                      storeFile file("%s")
                      storePassword "%s"
                      keyAlias "%s"
                      keyPassword "%s"
                  }
              }
          ''' % (keystore_path, store_pw, key_alias, key_pw)

          # Insert before buildTypes
          content = content.replace('    buildTypes {', signing_block + '\n    buildTypes {')

          # Add signingConfig to release
          release_idx = content.find('release {', content.find('buildTypes {'))
          if release_idx != -1:
              content = content[:release_idx + len('release {')] + '\n            signingConfig signingConfigs.release' + content[release_idx + len('release {'):]

          with open(gradle_path, 'w') as f:
              f.write(content)

          print('build.gradle patched with hardcoded signing config')
          PYEOF

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calicut-traders-crm-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
